user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Format log standar yang mencatat alamat IP asli dan detail akses agen pengguna
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    # Penyimpanan file log akses secara terpusat untuk audit Kominfo
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Kompresi Gzip untuk optimalisasi bandwidth jaringan instansi
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        listen 80;
        server_name localhost;

        # =========================================================================
        # SECURITY HEADERS (Mandat Kepatuhan SE Keamanan Informasi Kabupaten Sleman)
        # =========================================================================
        # Mencegah serangan Clickjacking
        add_header X-Frame-Options "DENY" always;
        
        # Mencegah Sniffing tipe MIME oleh browser
        add_header X-Content-Type-Options "nosniff" always;
        
        # Mengaktifkan filter XSS bawaan browser modern
        add_header X-XSS-Protection "1; mode=block" always;
        
        # Kebijakan Referrer untuk menjaga kerahasiaan rujukan URL
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        # Content Security Policy (CSP) untuk mencegah Stored/Reflected XSS dan pembatasan domain koneksi API
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.supabase.co; connect-src 'self' https://*.supabase.co wss://*.supabase.co;" always;

        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            # Penanganan routing Single Page Application (SPA) React Router
            try_files $uri $uri/ /index.html;
        }

        # Cache control khusus untuk static assets hasil kompilasi Vite (dilengkapi hash unik)
        location /assets/ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }

        # Penanganan halaman galat server
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
